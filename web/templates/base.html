<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ARM Demo{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --surface2: #242838;
      --border:   #2e3347;
      --accent:   #6c63ff;
      --accent2:  #ff6584;
      --green:    #43d9ad;
      --yellow:   #f9c74f;
      --text:     #e2e8f0;
      --muted:    #8892a4;
      --radius:   12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Sidebar ──────────────────────────────────────────────────── */
    .layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 24px 16px;
      position: sticky; top: 0; height: 100vh;
    }

    .sidebar-brand {
      font-size: 18px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 32px; padding: 0 8px;
    }
    .sidebar-brand span { font-size: 11px; font-weight: 400;
      display: block; color: var(--muted); -webkit-text-fill-color: var(--muted); }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      color: var(--muted); text-decoration: none;
      font-size: 14px; font-weight: 500;
      transition: all .2s;
      margin-bottom: 4px;
    }
    .nav-item:hover, .nav-item.active {
      background: var(--surface2); color: var(--text);
    }
    .nav-item.active { color: var(--accent); }
    .nav-icon { font-size: 18px; width: 20px; text-align: center; }

    /* ── Main ──────────────────────────────────────────────────────── */
    .main { flex: 1; padding: 32px; overflow-y: auto; }

    .page-title {
      font-size: 24px; font-weight: 700; margin-bottom: 4px;
    }
    .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

    /* ── Cards ─────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .card-title {
      font-size: 13px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .05em; color: var(--muted); margin-bottom: 12px;
    }

    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 24px;
    }
    .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .stat-value { font-size: 32px; font-weight: 700; }
    .stat-value.accent  { color: var(--accent); }
    .stat-value.green   { color: var(--green); }
    .stat-value.yellow  { color: var(--yellow); }
    .stat-value.accent2 { color: var(--accent2); }

    /* ── Table ─────────────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left; padding: 10px 14px;
      background: var(--surface2); color: var(--muted);
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em;
    }
    td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: rgba(108,99,255,.05); }

    /* ── Badges ────────────────────────────────────────────────────── */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .badge-apriori   { background: rgba(108,99,255,.15); color: var(--accent); }
    .badge-fpgrowth  { background: rgba(67,217,173,.15); color: var(--green); }
    .badge-ht        { background: rgba(249,199,79,.15);  color: var(--yellow); }
    .badge-manual    { background: rgba(108,99,255,.15); color: var(--accent); }
    .badge-imported  { background: rgba(67,217,173,.15); color: var(--green); }

    /* ── Buttons ───────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; border: none;
      transition: all .2s; text-decoration: none;
    }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-primary:hover  { background: #5a52d5; }
    .btn-danger   { background: rgba(255,101,132,.15); color: var(--accent2); border: 1px solid var(--accent2); }
    .btn-danger:hover   { background: var(--accent2); color: #fff; }
    .btn-ghost    { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover    { border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Forms ─────────────────────────────────────────────────────── */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    input[type=text], input[type=number], select, textarea {
      width: 100%; padding: 9px 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 13px;
      transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--accent);
    }

    /* ── Misc ──────────────────────────────────────────────────────── */
    .row { display: flex; gap: 20px; }
    .col { flex: 1; }
    .mt-4 { margin-top: 24px; }
    .mb-4 { margin-bottom: 24px; }
    .flex { display: flex; align-items: center; }
    .gap-2 { gap: 8px; }
    .ml-auto { margin-left: auto; }

    .empty-state { text-align: center; padding: 48px; color: var(--muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 18px; font-size: 13px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      transition: opacity .3s, transform .3s;
      z-index: 999;
    }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error   { border-color: var(--accent2); color: var(--accent2); }

    /* Pagination */
    .pagination { display: flex; gap: 6px; margin-top: 16px; }
    .page-link {
      padding: 6px 12px; border-radius: 6px; font-size: 12px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); text-decoration: none; cursor: pointer;
    }
    .page-link.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .page-link:hover:not(.active) { border-color: var(--accent); color: var(--text); }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      ⬡ ARM Demo
      <span>Association Rule Mining</span>
    </div>
    <nav>
      <a href="{{ url_for('index') }}"
         class="nav-item {% if request.endpoint == 'index' %}active{% endif %}">
        <span class="nav-icon">🏠</span> Dashboard
      </a>
      <a href="{{ url_for('transactions_page') }}"
         class="nav-item {% if request.endpoint == 'transactions_page' %}active{% endif %}">
        <span class="nav-icon">🧾</span> Giao dịch
      </a>
      <a href="{{ url_for('mining_page') }}"
         class="nav-item {% if request.endpoint == 'mining_page' %}active{% endif %}">
        <span class="nav-icon">⚙️</span> Khai phá
      </a>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>

<div id="toast" class="toast" style="display:none"></div>

<script>
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.style.display = 'block';
  t.style.opacity = '1';
  t.style.transform = 'translateY(0)';
  setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateY(8px)';
    setTimeout(() => t.style.display = 'none', 300);
  }, 3000);
}

async function apiCall(url, opts={}) {
  const res = await fetch(url, {
    headers: {'Content-Type': 'application/json'},
    ...opts
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Lỗi không xác định');
  return data;
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
